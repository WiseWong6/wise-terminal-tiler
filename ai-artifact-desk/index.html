  <script>
    (function() {
      function normalizeTheme(theme) {
        return theme === 'dark' || theme === 'light' ? theme : null;
      }

      function getUrlTheme() {
        try {
          var searchTheme = normalizeTheme(new URLSearchParams(window.location.search).get('theme'));
          if (searchTheme) return searchTheme;

          var hash = window.location.hash.replace(/^#/, '').replace(/^\?/, '');
          return normalizeTheme(new URLSearchParams(hash).get('theme'));
        } catch (err) {
          return null;
        }
      }

      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.dataset.theme = 'dark';
        } else {
          delete document.documentElement.dataset.theme;
        }
      }

      var urlTheme = getUrlTheme();

      function getInitialTheme() {
        if (urlTheme) return urlTheme;
        try {
          const savedTheme = localStorage.getItem('theme');
          const normalizedSavedTheme = normalizeTheme(savedTheme);
          if (normalizedSavedTheme) return normalizedSavedTheme;
        } catch (err) {}
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          return 'dark';
        }
        return 'light';
      }

      // 初始：优先使用外部传入主题，再跟随站点持久化主题，最后回退系统偏好
      applyTheme(getInitialTheme());

      window.addEventListener('storage', function(event) {
        if (urlTheme) return;
        var nextTheme = normalizeTheme(event.newValue);
        if (event.key === 'theme' && nextTheme) {
          applyTheme(nextTheme);
        }
      });

      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
          if (urlTheme) return;
          let savedTheme = null;
          try {
            savedTheme = localStorage.getItem('theme');
          } catch (err) {}
          if (!normalizeTheme(savedTheme)) {
            applyTheme(event.matches ? 'dark' : 'light');
          }
        });
      }

      function getParentOrigin() {
        if (window.parent === window) return '';
        if (location.protocol === 'file:') return 'null';
        try {
          return document.referrer ? new URL(document.referrer).origin : location.origin;
        } catch (err) {
          return location.origin;
        }
      }

      var parentOrigin = getParentOrigin();

      if (window.parent && window.parent !== window) {
        window.parent.postMessage(
          { type: 'theme-ready' },
          parentOrigin === 'null' ? '*' : parentOrigin
        );
      }

      // 监听父页面 postMessage
      window.addEventListener('message', function(event) {
        if (window.parent !== window) {
          if (parentOrigin === 'null') {
            if (event.origin !== 'null' && event.origin !== '') return;
          } else if (event.origin !== parentOrigin) {
            return;
          }
        }
        if (event.data && event.data.type === 'theme') {
          applyTheme(event.data.theme);
        }
      });
    })();
  </script>
