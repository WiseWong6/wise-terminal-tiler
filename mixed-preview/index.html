<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixed Preview</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                50:  '#ffffff',
                100: '#f7f7f7',
                200: '#eeeeee',
                300: '#dddddd',
                400: '#bbbbbb',
                500: '#888888',
                600: '#666666',
                700: '#444444',
                800: '#222222',
                900: '#000000',
                950: '#000000',
              },
              indigo: {
                50:  '#eef2ff',
                100: '#dbe4fe',
                200: '#c0d3fd',
                300: '#94b5fc',
                400: '#6490f9',
                500: '#3e6cf4',
                600: '#002FA7',
                700: '#1e40af',
                800: '#1e3a8a',
                900: '#172554',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
          },
        },
      }
    </script>
    <style>
      html, body, #root {
        height: 100%;
        overflow: hidden;
      }
      /* 暗色模式覆盖 */
      [data-theme="dark"] .bg-slate-50,
      [data-theme="dark"] .hover\:bg-slate-50:hover,
      [data-theme="dark"] .bg-slate-100,
      [data-theme="dark"] .hover\:bg-slate-100:hover,
      [data-theme="dark"] .bg-white,
      [data-theme="dark"] .bg-white\/90 { background-color: #111113 !important; }

      [data-theme="dark"] .bg-slate-100 { background-color: #161618 !important; }
      [data-theme="dark"] .hover\:bg-slate-100:hover { background-color: #1c1c1e !important; }
      [data-theme="dark"] .hover\:bg-slate-50:hover { background-color: #1c1c1e !important; }

      [data-theme="dark"] .border-slate-200,
      [data-theme="dark"] .border-slate-300,
      [data-theme="dark"] .border-slate-100 { border-color: #3a3a3c !important; }

      [data-theme="dark"] .text-slate-900,
      [data-theme="dark"] .text-slate-800,
      [data-theme="dark"] .prose-slate { color: #d1d1d6 !important; }

      [data-theme="dark"] .text-slate-700 { color: #c7c7cc !important; }
      [data-theme="dark"] .text-slate-600 { color: #a1a1a6 !important; }
      [data-theme="dark"] .text-slate-500 { color: #8e8e93 !important; }
      [data-theme="dark"] .text-slate-400 { color: #636366 !important; }

      [data-theme="dark"] .prose-slate { --tw-prose-body: #d1d1d6; --tw-prose-headings: #f5f5f7; --tw-prose-bold: #f5f5f7; --tw-prose-links: #2962ff; --tw-prose-code: #d1d1d6; --tw-prose-quotes: #a1a1a6; --tw-prose-quote-borders: #3a3a3c; }

      [data-theme="dark"] .bg-slate-800 { background-color: #242426 !important; }

      [data-theme="dark"] .bg-slate-100\/90 { background-color: rgba(22, 22, 24, 0.9) !important; }

      [data-theme="dark"] .text-indigo-600,
      [data-theme="dark"] .hover\:text-indigo-600:hover { color: #2962ff !important; }

      [data-theme="dark"] .text-indigo-700 { color: #94b5fc !important; }

      [data-theme="dark"] .bg-indigo-600 { background-color: #2962ff !important; }
      [data-theme="dark"] .hover\:bg-indigo-700:hover { background-color: #1e40af !important; }

      [data-theme="dark"] .bg-indigo-50 { background-color: #1c1c2e !important; }
      [data-theme="dark"] .bg-indigo-100 { background-color: #242436 !important; }
      [data-theme="dark"] .hover\:bg-indigo-100:hover { background-color: #2c2c3e !important; }

      [data-theme="dark"] .text-white { color: #d1d1d6 !important; }

      [data-theme="dark"] .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,0.3) !important; }
      [data-theme="dark"] .shadow-lg { box-shadow: 0 10px 15px rgba(0,0,0,0.5) !important; }
      [data-theme="dark"] .shadow-xl { box-shadow: 0 20px 25px rgba(0,0,0,0.6) !important; }
      [data-theme="dark"] .shadow-2xl { box-shadow: 0 25px 50px rgba(0,0,0,0.7) !important; }

      [data-theme="dark"] .border-indigo-200 { border-color: #1e3a5f !important; }

      [data-theme="dark"] .text-green-700 { color: #6ee7b7 !important; }
      [data-theme="dark"] .bg-green-50 { background-color: #0a1c14 !important; }
      [data-theme="dark"] .border-green-200 { border-color: #14522e !important; }

      [data-theme="dark"] .text-red-700 { color: #f87171 !important; }
      [data-theme="dark"] .bg-red-50 { background-color: #1c1016 !important; }
      [data-theme="dark"] .bg-red-100 { background-color: #241418 !important; }
      [data-theme="dark"] .hover\:bg-red-200:hover { background-color: #2c181c !important; }
      [data-theme="dark"] .border-red-200 { border-color: #3a1c20 !important; }

      [data-theme="dark"] body,
      [data-theme="dark"] .bg-white { background-color: #111113 !important; }

      /* === Skeleton loading screen === */
      .skeleton-app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      }
      .skeleton-header {
        height: 56px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        border-bottom: 1px solid #d9d6cc;
        background: #f5f5f0;
        flex-shrink: 0;
      }
      [data-theme="dark"] .skeleton-header {
        border-color: #3a3a3c;
        background: #111113;
      }
      .skeleton-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #f5f5f0;
      }
      @media (min-width: 768px) {
        .skeleton-body {
          flex-direction: row;
        }
      }
      [data-theme="dark"] .skeleton-body {
        background: #111113;
      }
      .skeleton-editor {
        flex: 1;
        padding: 20px;
        border-bottom: 1px solid #d9d6cc;
        border-right: none;
        background: #f5f5f0;
        overflow: hidden;
      }
      @media (min-width: 768px) {
        .skeleton-editor {
          border-bottom: none;
          border-right: 1px solid #d9d6cc;
        }
      }
      [data-theme="dark"] .skeleton-editor {
        border-color: #3a3a3c;
        background: #111113;
      }
      .skeleton-preview {
        flex: 1;
        padding: 20px;
        background: #f5f5f0;
        overflow: hidden;
      }
      [data-theme="dark"] .skeleton-preview {
        background: #111113;
      }
      .skeleton-bar {
        background: linear-gradient(90deg, #a19b8c 25%, #d9d6cc 50%, #a19b8c 75%);
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s ease-in-out infinite;
        border-radius: 4px;
      }
      [data-theme="dark"] .skeleton-bar {
        background: linear-gradient(90deg, #2c2c2e 25%, #3a3a3c 50%, #2c2c2e 75%);
        background-size: 200% 100%;
      }
      @keyframes skeleton-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root">
      <div class="skeleton-app">
        <div class="skeleton-header">
          <div class="skeleton-bar" style="width:32px;height:32px;border-radius:8px;"></div>
          <div style="flex:1;"></div>
          <div>
            <div class="skeleton-bar" style="width:140px;height:18px;margin-bottom:4px;"></div>
            <div class="skeleton-bar" style="width:200px;height:12px;"></div>
          </div>
          <div style="flex:1;"></div>
          <div class="skeleton-bar" style="width:32px;height:32px;border-radius:8px;"></div>
          <div class="skeleton-bar" style="width:32px;height:32px;border-radius:8px;"></div>
          <div class="skeleton-bar" style="width:32px;height:32px;border-radius:8px;"></div>
        </div>
        <div class="skeleton-body">
          <div class="skeleton-editor">
            <div style="display:flex;gap:8px;margin-bottom:16px;">
              <div class="skeleton-bar" style="width:60px;height:28px;border-radius:6px;"></div>
              <div class="skeleton-bar" style="width:60px;height:28px;border-radius:6px;"></div>
            </div>
            <div class="skeleton-bar" style="width:55%;height:14px;margin-bottom:10px;"></div>
            <div class="skeleton-bar" style="width:90%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:85%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:92%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:60%;height:12px;margin-bottom:16px;"></div>
            <div class="skeleton-bar" style="width:100%;height:100px;border-radius:8px;margin-bottom:16px;"></div>
            <div class="skeleton-bar" style="width:45%;height:14px;margin-bottom:10px;"></div>
            <div class="skeleton-bar" style="width:90%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:80%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:88%;height:12px;margin-bottom:8px;"></div>
          </div>
          <div class="skeleton-preview">
            <div style="display:flex;gap:8px;margin-bottom:16px;justify-content:flex-end;">
              <div class="skeleton-bar" style="width:28px;height:28px;border-radius:6px;"></div>
              <div class="skeleton-bar" style="width:28px;height:28px;border-radius:6px;"></div>
              <div class="skeleton-bar" style="width:28px;height:28px;border-radius:6px;"></div>
              <div class="skeleton-bar" style="width:80px;height:28px;border-radius:6px;"></div>
            </div>
            <div class="skeleton-bar" style="width:65%;height:26px;margin-bottom:14px;border-radius:4px;"></div>
            <div class="skeleton-bar" style="width:100%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:95%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:90%;height:12px;margin-bottom:16px;"></div>
            <div class="skeleton-bar" style="width:100%;height:80px;border-radius:8px;margin-bottom:16px;"></div>
            <div class="skeleton-bar" style="width:50%;height:20px;margin-bottom:12px;border-radius:4px;"></div>
            <div class="skeleton-bar" style="width:100%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:85%;height:12px;margin-bottom:8px;"></div>
            <div class="skeleton-bar" style="width:92%;height:12px;margin-bottom:8px;"></div>
          </div>
        </div>
      </div>
    </div>
  <script type="module" src="/index.tsx"></script>
  <script>
    (function() {
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.dataset.theme = 'dark';
        } else {
          delete document.documentElement.dataset.theme;
        }
      }

      function getInitialTheme() {
        try {
          const savedTheme = localStorage.getItem('theme');
          if (savedTheme === 'dark' || savedTheme === 'light') return savedTheme;
        } catch (err) {}
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          return 'dark';
        }
        return 'light';
      }

      // 初始：优先跟随站点持久化主题，再回退系统偏好
      applyTheme(getInitialTheme());

      window.addEventListener('storage', function(event) {
        if (event.key === 'theme' && (event.newValue === 'dark' || event.newValue === 'light')) {
          applyTheme(event.newValue);
        }
      });

      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
          let savedTheme = null;
          try {
            savedTheme = localStorage.getItem('theme');
          } catch (err) {}
          if (savedTheme !== 'dark' && savedTheme !== 'light') {
            applyTheme(event.matches ? 'dark' : 'light');
          }
        });
      }

      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'theme-ready' }, '*');
      }

      // 监听父页面 postMessage
      window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'theme') {
          applyTheme(event.data.theme);
        }
      });
    })();
  </script>
</body>
</html>
