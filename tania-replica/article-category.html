<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Article — Wise</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="themes.css">
  <style>
    .navbar-logo svg, svg.navbar-logo, .navbar-logo {
      height: 22px; min-height: 22px; min-width: 22px; width: 22px;
      display: inline-block; vertical-align: middle;
    }
    .sidebar-section svg, .sidebar-section .sidebar-links svg, .sidebar-section .sidebar-nav-links svg {
      height: 16px; width: 16px; flex-shrink: 0; display: inline-block;
    }
    .navbar-menu svg, .navbar-menu.nav-items svg {
      height: 16px; width: 16px; display: inline-block;
    }
    .button svg, a.button svg {
      height: 20px; min-height: 20px; min-width: 20px; width: 20px;
      flex-shrink: 0; display: inline-block; margin-right: 0.25rem;
    }
    .heading-icon svg {
      height: 24px; width: 24px; display: inline-block;
    }
    .sidebar-nav-links a { align-items: center; display: flex; gap: 0.5rem; }
    .article-list { display:flex; flex-direction:column; gap:1.5rem; margin-top:1.5rem; }
    .article-card { display:flex; border:0.25px solid var(--color-border); border-radius:var(--border-radius); background:var(--color-background-card); overflow:hidden; text-decoration:none !important; color:inherit; transition:all 0.15s; }
    .article-card:hover { border-color:var(--color-primary); transform:translateY(-2px); }
    .article-cover { width:260px; flex-shrink:0; aspect-ratio:21/9; height:auto; align-self:center; }
    .article-body { padding:1rem; flex:1; display:flex; flex-direction:column; justify-content:center; }
    .article-body h3 { margin:0 0 0.5rem; font-size:1.1rem; color:var(--color-text); }
    .article-body p { margin:0 0 0.75rem; font-size:0.9rem; color:var(--color-text-muted); line-height:1.5; }
    .article-body time { font-size:0.8rem; color:var(--color-text-muted); }
    @media screen and (max-width: 640px) {
      .article-card { flex-direction:column; }
      .article-cover { width:100%; aspect-ratio:21/9; }
    }
    #back-to-top {
      position: fixed; right: 1.5rem; bottom: 1.5rem;
      padding: 0.6rem; border-radius: var(--border-radius);
      border:0.25px solid var(--color-border);
      background: var(--color-background-card);
      color: var(--color-text);
      cursor: pointer; z-index: 100;
    }
    .sidebar-collapse-btn {
      display: none; background: transparent; border: none;
      color: var(--color-text-muted); cursor: pointer; padding: 0.3rem;
      border-radius: var(--border-radius); align-items: center; justify-content: center;
    }
    .sidebar-collapse-btn:hover {
      background: var(--color-background-navbar-link-hover);
      color: var(--color-text-emphasized);
    }
    @media screen and (min-width: 1020px) {
      .sidebar-collapse-btn { display: flex; }
      .layout { transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
      .sidebar { transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
      .layout.sidebar-collapsed { grid-template-columns: 52px 1fr; }
      .layout.sidebar-collapsed .sidebar { width: 52px; min-width: 52px; overflow: hidden; }
      .layout.sidebar-collapsed .sidebar .site-name,
      .layout.sidebar-collapsed .sidebar .sidebar-nav-links a span,
      .layout.sidebar-collapsed .sidebar .sidebar-links a span,
      .layout.sidebar-collapsed .sidebar-section h2,
      .layout.sidebar-collapsed .sidebar .sidebar-links,
      .layout.sidebar-collapsed .sidebar .navbar-button,
      .layout.sidebar-collapsed .sidebar .dropdown,
      .layout.sidebar-collapsed .sidebar .tooltip-container,
      .layout.sidebar-collapsed .sidebar .sidebar-title-link > a {
        display: none;
      }
      .layout.sidebar-collapsed .sidebar .sidebar-title-link { justify-content: center; padding: 0; }
      .layout.sidebar-collapsed .sidebar .sidebar-title-link .flex-align-center { flex-direction: column; }
      .layout.sidebar-collapsed .sidebar-collapse-btn svg { transform: rotate(180deg); }
      .layout.sidebar-collapsed .sidebar .sidebar-nav-links a { justify-content: center; margin: 0; padding: 0.5rem; font-size: 0; }
      .layout.sidebar-collapsed .sidebar-section { margin: 1.25rem 0; padding-bottom: 1.5rem; }
    }
    .breadcrumb { display:flex; align-items:center; gap:0.5rem; font-size:0.85rem; color:var(--color-text-muted); margin-bottom:1rem; }
    .breadcrumb a { color:var(--color-text-muted); text-decoration:none; }
    .breadcrumb a:hover { color:var(--color-primary); }
    .category-header { margin-bottom:1.5rem; }
    .category-header h1 { font-size:var(--h2); margin-bottom:0.5rem; }
    .category-header p { color:var(--color-text-muted); margin:0; }
  </style>
</head>

  <script src="./articles-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const menuButton = document.querySelector('.nav-menu-button');
      const navMenu = document.querySelector('.navbar-menu');
      if (menuButton && navMenu) {
        menuButton.addEventListener('click', function() { navMenu.classList.toggle('active'); });
      }
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', function() {
          const html = document.documentElement;
          if (html.classList.contains('is-dark')) { html.classList.remove('is-dark'); html.classList.add('is-light'); localStorage.setItem('theme','light'); }
          else if (html.classList.contains('is-light')) { html.classList.remove('is-light'); localStorage.removeItem('theme'); }
          else { html.classList.add('is-dark'); localStorage.setItem('theme','dark'); }
        });
      }
      function toggleSidebar() {
        document.getElementById('layout').classList.toggle('sidebar-collapsed');
      }
      const sidebarToggle = document.getElementById('sidebar-toggle');
      if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);
      const sidebarCollapseBtn = document.getElementById('sidebar-collapse-btn');
      if (sidebarCollapseBtn) sidebarCollapseBtn.addEventListener('click', toggleSidebar);
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') document.documentElement.classList.add('is-dark');
      else if (saved === 'light') document.documentElement.classList.add('is-light');

      const backToTop = document.getElementById('back-to-top');
      if (backToTop) {
        function updateBackToTop() {
          if (window.scrollY > 300) backToTop.classList.add('visible');
          else backToTop.classList.remove('visible');
        }
        updateBackToTop();
        window.addEventListener('scroll', updateBackToTop);
        backToTop.addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      // 分类详情页渲染
      function renderCategory() {
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat') || 'ai-product';

        try {
          const data = ARTICLES_DATA;
          const categoryData = data[cat];

          if (!categoryData) {
            document.getElementById('category-list').innerHTML = `<div style="padding:2rem;text-align:center;color:var(--color-text-muted);">分类不存在</div>`;
            return;
          }

          document.getElementById('breadcrumb-cat').textContent = categoryData.label;
          document.getElementById('category-title').textContent = categoryData.label;
          document.getElementById('category-count').textContent = `共 ${categoryData.articles.length} 篇文章`;

          let html = '';
          categoryData.articles.forEach(art => {
            const coverHtml = art.cover
              ? `<img class="article-cover" src="${art.cover}" alt="${art.title}" loading="lazy">`
              : `<div class="article-cover" style="background:var(--color-background-alternate);"></div>`;
            html += `
              <a href="${art.url}" target="_blank" rel="noreferrer" class="article-card">
                ${coverHtml}
                <div class="article-body">
                  <h3>${art.title}</h3>
                  <p>${art.summary || ''}</p>
                  <time>${art.date || ''}</time>
                </div>
              </a>
            `;
          });

          if (categoryData.articles.length === 0) {
            html = `<div style="padding:2rem;text-align:center;color:var(--color-text-muted);">暂无文章，敬请期待…</div>`;
          }

          document.getElementById('category-list').innerHTML = html;
        } catch (err) {
          console.error('加载文章失败:', err);
          document.getElementById('category-list').innerHTML = `<div style="padding:2rem;text-align:center;color:var(--color-text-muted);">加载失败，请刷新重试</div>`;
        }
      }
      renderCategory();
    });
  </script>
