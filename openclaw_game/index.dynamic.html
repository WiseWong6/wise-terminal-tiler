<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Core</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/styles.dynamic.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="app-loading">
  <div class="beach-background">
    <div class="beach-ocean"></div>
    <div class="beach-foam"></div>
    <div class="beach-sand"></div>
  </div>
  <div class="beach-overlay"></div>

  <div id="lobster-container">
    <svg width="38" height="65" viewBox="0 0 14 24" xmlns="http://www.w3.org/2000/svg" shapeRendering="crispEdges">
      <rect x="1" y="1" width="3" height="5" fill="#e63946" />
      <rect x="10" y="1" width="3" height="5" fill="#e63946" />
      <rect x="2" y="6" width="1" height="2" fill="#a82331" />
      <rect x="11" y="6" width="1" height="2" fill="#a82331" />
      <rect x="3" y="7" width="2" height="2" fill="#e63946" />
      <rect x="9" y="7" width="2" height="2" fill="#e63946" />
      <rect x="5" y="6" width="4" height="3" fill="#e63946" />
      <rect x="5" y="6" width="1" height="1" fill="#000" />
      <rect x="8" y="6" width="1" height="1" fill="#000" />
      <rect x="5" y="9" width="4" height="10" fill="#e63946" />
      <rect x="3" y="10" width="2" height="1" fill="#a82331" />
      <rect x="9" y="10" width="2" height="1" fill="#a82331" />
      <rect x="3" y="12" width="2" height="1" fill="#a82331" />
      <rect x="9" y="12" width="2" height="1" fill="#a82331" />
      <rect x="3" y="14" width="2" height="1" fill="#a82331" />
      <rect x="9" y="14" width="2" height="1" fill="#a82331" />
      <rect x="3" y="16" width="2" height="1" fill="#a82331" />
      <rect x="9" y="16" width="2" height="1" fill="#a82331" />
      <rect x="3" y="18" width="2" height="1" fill="#a82331" />
      <rect x="9" y="18" width="2" height="1" fill="#a82331" />
      <rect x="5" y="19" width="4" height="3" fill="#a82331" />
      <rect x="4" y="22" width="6" height="1" fill="#e63946" />
    </svg>
  </div>

  <div class="layout-wrapper">
    <div class="main-view">
      <header class="header">
        <div class="header-title-group">
          <div class="header-icon">
            <i class="fa-solid fa-bolt-lightning"></i>
          </div>
          <div>
            <h1>OpenClaw Core</h1>
            <div class="header-subtitle">Persistent agents + ephemeral sub-agent runs</div>
          </div>
        </div>

        <div class="header-status-group">
          <div id="runtime-mode" class="runtime-pill">Loading</div>
          <div id="connection-status" class="status-badge disconnected">
            <div class="status-dot"></div>
            <span>Disconnected</span>
          </div>
        </div>
      </header>

      <div class="center-stage">
        <div class="grid-background"></div>

        <div class="character-area">
          <div class="stage-legend">
            <span class="legend-chip legend-chip-main">常驻主 Agent</span>
            <span class="legend-chip legend-chip-worker">常驻 Agent</span>
            <span class="legend-chip legend-chip-subagent">临时 Sub-agent</span>
          </div>

          <div class="office-floor">
            <div class="room-rug"></div>
            <div class="server-rack">
              <div class="server-lights"></div>
              <div class="server-lights"></div>
              <div class="server-lights"></div>
            </div>
            <div class="potted-plant plant-left"></div>
            <div class="potted-plant plant-right"></div>
            <svg id="office-svg-lines" class="office-svg-lines"></svg>
            <div id="agents-cluster" class="agents-cluster dynamic-layout"></div>
          </div>
        </div>

        <div class="user-input-section">
          <div id="user-bubble-container" class="user-bubble-container">
            <div class="user-bubble">
              <div class="user-bubble-top-border"></div>
              <div class="user-bubble-header">
                <div class="user-icon-bg"><i class="fa-solid fa-user"></i></div>
                <div class="user-bubble-title">User Input</div>
              </div>
              <div id="user-bubble-content" class="user-bubble-content">...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <aside class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-row1">
          <div class="chat-header-title">
            <i class="fa-solid fa-server"></i>
            CONVERSATIONS & EVENTS
          </div>
          <div class="filter-group">
            <button id="filter-chat" class="filter-btn active">对话</button>
            <button id="filter-all" class="filter-btn">全量</button>
          </div>
        </div>

        <div class="channel-session-controls">
          <select id="kind-selector" class="session-select">
            <option value="all">全部类型</option>
            <option value="user">用户会话</option>
            <option value="subagent">子 Agent</option>
          </select>
          <select id="channel-selector" class="session-select">
            <option value="">全部渠道</option>
            <option value="tui">🖥️ TUI</option>
            <option value="feishu-group">👥 飞书群聊</option>
            <option value="feishu-direct">💬 飞书私聊</option>
            <option value="cron">⏰ Cron</option>
            <option value="heartbeat">💓 Heartbeat</option>
          </select>
          <select id="agent-selector" class="session-select">
            <option value="">🤖 全部 Agent</option>
          </select>
          <select id="session-selector" class="session-select session-select--wide">
            <option value="">全部 (近7天)</option>
          </select>
        </div>
      </div>

      <div id="log-waterfall" class="chat-content"></div>

      <div class="scroll-bottom-container">
        <button id="scroll-bottom-btn" class="scroll-btn">
          <i class="fa-solid fa-chevron-down"></i>
        </button>
      </div>
    </aside>
  </div>

  <script type="module" src="/app.js"></script>
</body>

</html>
