name: Sync Mixed Preview to Website

on:
  push:
    branches: [main]
    paths:
      - 'mixed-preview/**'
      - '.github/workflows/sync-mixed-preview.yml'
  workflow_dispatch:

concurrency:
  group: sync-mixed-preview
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wise-labs
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mixed-preview/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mixed-preview

      - name: Build mixed-preview
        run: npm run build
        working-directory: mixed-preview

      - name: Sync dist to website repo
        run: |
          git clone --depth 1 https://x-access-token:${WEBSITE_REPO_TOKEN}@github.com/WiseWong6/website.git website-repo
          rm -rf website-repo/mixed-preview/assets
          cp -r mixed-preview/dist/assets website-repo/mixed-preview/
          cp mixed-preview/dist/index.html website-repo/mixed-preview/index.html
          cd website-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mixed-preview/
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "chore: sync mixed-preview from wise-labs"
            git push
          fi
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
