name: Deploy Mixed Preview

on:
  push:
    branches: [main]
    paths:
      - 'mixed-preview/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mixed-preview/package-lock.json

      - run: npm ci
        working-directory: mixed-preview

      - run: npm run build
        working-directory: mixed-preview

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mixed-preview/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
